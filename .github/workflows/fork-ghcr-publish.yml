name: Fork GHCR Publish

# Builds the forked Trailarr image (with the Clips feature) and publishes it to
# GitHub Container Registry (GHCR) under this fork's namespace, using the
# built-in GITHUB_TOKEN — no Docker Hub secrets required.
#
# Pull on TrueNAS with:  ghcr.io/djmeero/trailarr:main   (or :latest)

on:
  push:
    branches:
      - 'main'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_and_push:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # GHCR requires a lowercase image path
      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # TrueNAS SCALE is amd64. Add linux/arm64 here if you run on ARM
          # (doubles the build time).
          platforms: linux/amd64
          build-args: |
            APP_VERSION=0.9.7-clips
